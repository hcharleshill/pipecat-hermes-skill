[global]
type=global
user_agent=asterisk-hermes

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=10.1.1.0/24
external_media_address=10.1.1.106
external_signaling_address=10.1.1.106

[101]
type=endpoint
context=hermes
disallow=all
allow=ulaw
auth=101-auth
aors=101
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
media_encryption=sdes
use_avpf=no
rtcp_mux=no

[101-auth]
type=auth
auth_type=userpass
username=101
password=101

[101]
type=aor
max_contacts=5
remove_existing=yes

[6001]
type=endpoint
context=hermes
disallow=all
allow=ulaw
auth=6001-auth
aors=6001
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
media_encryption=sdes
use_avpf=no
rtcp_mux=no

[6001-auth]
type=auth
auth_type=userpass
username=6001
password=6001

[6001]
type=aor
max_contacts=5
remove_existing=yes
