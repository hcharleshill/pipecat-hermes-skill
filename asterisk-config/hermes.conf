[general]
static = yes
writeprotect = no
autofallthrough = yes
clearglobalvars = no

; ============================================================================
; Pipecat Hermes Skill – Standard Asterisk Dialplan Configlet
;
; PURPOSE
;   This is the recommended reusable snippet for production or example
;   Asterisk systems that want to expose the Pipecat Hermes Skill.
;
; HOW TO USE
;   Option A (recommended for custom setups):
;     #include /etc/asterisk/hermes.conf
;
;   Option B:
;     Copy the [hermes] context below into your extensions.conf (or
;     extensions_custom.conf, extensions_override_freepbx.conf, etc.).
;
;   Then point your inbound route / from-pstn / from-internal etc. to
;   the desired extension (typically 101 for the live skill).
;
; REQUIREMENTS / NOTES
;   - The Stasis app name must be exactly "hermes" (the Python bridge
;     subscribes to it via ARI).
;   - The bridge uses ARI ExternalMedia + ulaw. Prefer/force ulaw (PCMU)
;     on the SIP peer side to avoid SDP negotiation pain.
;   - ExternalMedia creates UnicastRTP channels. Make sure your Asterisk
;     has res_ari_external_media and the RTP stack enabled.
;   - For NAT or remote phones you will usually want on the PJSIP endpoint:
;       direct_media=no
;       force_rport=yes
;       rewrite_contact=yes
;   - The Python bridge learns the return RTP address from the first
;     incoming packet (standard symmetric RTP behavior).
;
; TEST vs LIVE EXTENSIONS
;   100 = simple Echo() media test. Speak and you should hear yourself.
;         Excellent for verifying the audio path before expecting the
;         skill to talk back.
;   101 = the live skill (Stasis(hermes) → Python bridge → STT → agent
;         → TTS back to the caller).
;
; ============================================================================

[hermes]
; --- Media / RTP path test ----------------------------------------------------
; Use this to verify that audio flows both ways between the phone and
; Asterisk *before* you expect voice responses from the skill.
; No sound files are required in the Asterisk image.
exten => 100,1,NoOp(Hermes media test – Echo)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; Continuous 1004 Hz tone — one-way playback test (no mic needed)
exten => 102,1,NoOp(Hermes media test – Milliwatt tone)
 same => n,Answer()
 same => n,Milliwatt()
 same => n,Hangup()

; --- Live Pipecat Hermes Skill ------------------------------------------------
; This is the extension you point real phones / inbound routes at.
exten => 101,1,NoOp(Live Pipecat Hermes Skill)
 same => n,Answer()
 same => n,Stasis(hermes)
 same => n,Hangup()

; Fallback for anything else that lands in this context
exten => _X.,1,NoOp(Hermes fallback – unknown extension)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()
