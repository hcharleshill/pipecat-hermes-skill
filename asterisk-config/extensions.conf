[general]
static = yes
writeprotect = no
autofallthrough = yes
clearglobalvars = no

; This file is mounted from the host asterisk-config/ directory.
; For a normal Asterisk deployment you would normally do:
;     #include /etc/asterisk/hermes.conf
;
; In this development container we include the standard configlet
; directly so that dialing 100/101 does the expected thing without
; extra steps.
#include hermes.conf
